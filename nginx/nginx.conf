upstream backend {
    server api:8000;
}

upstream frontend_app {
    server frontend:3000;
}

# Rate limit zones — must be in http context, defined before server blocks.
# This file is loaded from /etc/nginx/conf.d/*.conf inside the global `http` block.
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name mirrorino.com www.mirrorino.com;
    return 301 https://mirrorino.com$request_uri;
}

server {
    listen 80;
    server_name api.mirrorino.com;
    return 301 https://api.mirrorino.com$request_uri;
}

# ── api.mirrorino.com ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.mirrorino.com;

    ssl_certificate     /etc/letsencrypt/live/api.mirrorino.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mirrorino.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 512M;
    client_body_timeout  300s;

    # Auth — strict
    location ~ ^/api/auth/(login|register) {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Downloads & raw — buffering off for streaming
    location ~ ^/(api/files/|raw/) {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Uploads — no request buffering, long timeout
    # Covers both legacy numeric repo uploads and identity-based uploads.
    location ~ ^/api/(repos/[0-9]+/files|users/[^/]+/repos/[^/]+/files)$ {
        proxy_pass              http://backend;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    # Everything else
    location / {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── mirrorino.com ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name mirrorino.com www.mirrorino.com;

    ssl_certificate     /etc/letsencrypt/live/mirrorino.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirrorino.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Cache static assets
    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp)$ {
        proxy_pass       http://frontend_app;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://frontend_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
