version: "3.9"

services:

  api:
    image: voidtrek/downloadino_backend:latest
    container_name: downloadino_api
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - file_data:/data/files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - downloadino_net

  frontend:
    image: voidtrek/downloadino_frontend:latest
    container_name: downloadino_frontend
    restart: unless-stopped
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-https://api.downloadino.com}
    networks:
      - downloadino_net

  db:
    image: postgres:16-alpine
    container_name: downloadino_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: downloadino
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: downloadino
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U downloadino"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - downloadino_net

  redis:
    image: redis:7-alpine
    container_name: downloadino_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - downloadino_net

  nginx:
    image: voidtrek/downloadino_nginx:latest
    container_name: downloadino_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - downloadino_net

volumes:
  postgres_data:
  redis_data:
  file_data:

networks:
  downloadino_net:
    driver: bridge
