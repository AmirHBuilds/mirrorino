version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env  # Injects POSTGRES_USER and POSTGRES_PASSWORD here
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    # PRODUCTION: 4 Workers, binding to 0.0.0.0
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env  # Automatically passes S3 keys, DB URLs, etc., for Pydantic to read

volumes:
  postgres_data: